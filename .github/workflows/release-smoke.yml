name: Release Smoke

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to smoke test, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  smoke:
    name: Smoke Test Published Images
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Resolve release tag and owner
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository at release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test published backend and frontend images
        run: npm run check:release-smoke
        env:
          BACKEND_IMAGE: ghcr.io/${{ steps.vars.outputs.owner }}/nextjs-go-monorepo-kit-backend:${{ steps.vars.outputs.tag }}
          FRONTEND_IMAGE: ghcr.io/${{ steps.vars.outputs.owner }}/nextjs-go-monorepo-kit-frontend:${{ steps.vars.outputs.tag }}
